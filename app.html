      <td><input class="compact" type="number" value="${lm.MEV}" data-action="set-lm" data-m="${m}" data-k="MEV"></td>
      <td><input class="compact" type="number" value="${lm.MAV[0]}" data-action="set-lm" data-m="${m}" data-k="MAV0"></td>
      <td><input class="compact" type="number" value="${lm.MAV[1]}" data-action="set-lm" data-m="${m}" data-k="MAV1"></td>
      <td><input class="compact" type="number" value="${lm.MRV}" data-action="set-lm" data-m="${m}" data-k="MRV"></td>
    </tr>`;
  }
  html += `</tbody></table></div>`;

  html += `<div class="card"><h2>Block controls</h2>
    <div class="row" style="gap:8px;">
      <button data-action="trigger-deload" class="danger">I'm cooked — trigger early deload</button>
      <button data-action="advance-week">Advance to next week (manual)</button>
      <button data-action="reset-block" class="danger">Reset Block 1</button>
    </div>
  </div>`;

  html += `<div class="card"><h2>Backup / Restore</h2>
    <div class="row" style="gap:8px;">
      <button data-action="export-json">Export JSON</button>
      <label class="row" style="gap:6px; margin:0;">
        <span>Import:</span>
        <input type="file" accept="application/json" data-action="import-json">
      </label>
    </div>
  </div>`;

  html += `<div class="card"><h2>Glute exercise</h2>
    <div class="muted" style="margin-bottom:8px;">Toggle back extension ↔ hip thrust for all Legs sessions.</div>
    <button data-action="swap-glute">Toggle (current: ${currentGluteExercise()})</button>
  </div>`;

  return html;
}

function currentGluteExercise() {
  const wk = currentWeekIdx(state);
  ensureWeekBuilt(state, wk);
  for (const sess of Object.values(state.currentBlock.prescriptions[wk] || {})) {
    if (sess.kind === "Legs") {
      if ((sess.exercises || []).find(e => e.exId === "hip_thrust")) return "Hip thrust";
      return "Back extension";
    }
  }
  return "Back extension";
}

// ============================================================================
// HANDLERS
// ============================================================================

function bindHandlers() {
  document.querySelectorAll("nav button[data-view]").forEach(b => {
    b.classList.toggle("active", b.dataset.view === activeView);
    b.onclick = () => { activeView = b.dataset.view; render(); };
  });

  // User menu
  const umBtn = document.querySelector("[data-action=open-user-menu]");
  if (umBtn) umBtn.onclick = () => { state._uiOverlay = state._uiOverlay === "user-menu" ? null : "user-menu"; saveState(); render(); };
  const closeUm = document.querySelector("[data-action=close-user-menu]");
  if (closeUm) closeUm.onclick = () => { state._uiOverlay = null; saveState(); render(); };
  document.querySelectorAll("[data-action=switch-user]").forEach(el => {
    el.onclick = () => {
      const uid = el.dataset.uid;
      saveState();
      setActiveUserId(uid);
      activeUserId = uid;
      state = loadUserState(uid) || emptyUserState("");
      if (state.customExercises) Object.assign(EXERCISES, state.customExercises);
      state._uiOverlay = null;
      saveState();
      render();
    };
  });
  document.querySelectorAll("[data-action=rename-user]").forEach(el => {
    el.onclick = () => {
      const uid = el.dataset.uid;
      const users = loadUsersList();
      const u = users.find(x => x.id === uid);
      if (!u) return;
      const newName = prompt("New name?", u.name);
      if (!newName) return;
      u.name = newName.trim();
      saveUsersList(users);
      if (uid === getActiveUserId()) { state.user.name = newName.trim(); saveState(); }
      render();
    };
  });
  document.querySelectorAll("[data-action=delete-user]").forEach(el => {
    el.onclick = () => {
      const uid = el.dataset.uid;
      const users = loadUsersList();
      if (users.length <= 1) { alert("Can't delete the only user."); return; }
      if (!confirm("Delete this user and all their data permanently?")) return;
      const updated = users.filter(u => u.id !== uid);
      saveUsersList(updated);
      localStorage.removeItem(USER_STATE_KEY(uid));
      if (uid === getActiveUserId()) {
        const next = updated[0].id;
        setActiveUserId(next);
        activeUserId = next;
        state = loadUserState(next);
      }
      render();
    };
  });
  const addUserBtn = document.querySelector("[data-action=add-user]");
  if (addUserBtn) addUserBtn.onclick = () => {
    const id = newUserId();
    const st = emptyUserState("");
    st.onboarding = { step: 0, draftKinds: ["Pull","Push","Legs"], draftTargets: {Pull:2,Push:2,Legs:1}, draftTemplate: {Pull:[],Push:[],Legs:[]}, currentKindIdx: 0, search: "" };
    saveUserState(id, st);
    const users = loadUsersList();
    users.push({ id, name: "(new user)", createdAt: new Date().toISOString() });
    saveUsersList(users);
    setActiveUserId(id);
    activeUserId = id;
    state = st;
    state._uiOverlay = null;
    saveState();
    render();
  };

  // Onboarding handlers
  const obWelcomeFresh = document.querySelector("[data-action=ob-build-fresh]");
  if (obWelcomeFresh) obWelcomeFresh.onclick = () => {
    state.onboarding = { step: 1, draftKinds: ["Pull","Push","Legs"], draftTargets: {Pull:2,Push:2,Legs:1}, draftTemplate: {Pull:[],Push:[],Legs:[]}, currentKindIdx: 0, search: "" };
    saveState(); render();
  };
  const obWelcomeExample = document.querySelector("[data-action=ob-use-example]");
  if (obWelcomeExample) obWelcomeExample.onclick = () => {
    // Adopt Bhaskar's known-good template as the starting point
    state.user.kinds = ["Pull","Push","Legs"];
    state.user.template = defaultTemplateFromBlock1();
    state.user.name = state.user.name || "Lifter";
    // Initialize block
    const today = new Date();
    state.currentBlock = {
      id: "block-1",
      startDate: isoDate(startOfWeek(today)),
      lengthWeeks: 5,
      focus: "recovery_recalibration",
      weeklyTargets: { Pull: 2, Push: 2, Legs: 1 },
      prescriptions: {},
      feedback: {},
      activeSlot: null,
      userCookedOverride: false
    };
    state.onboarding = null;
    // Update users list with current name
    const users = loadUsersList();
    const u = users.find(x => x.id === getActiveUserId());
    if (u) { u.name = state.user.name; saveUsersList(users); }
    saveState(); render();
  };

  document.querySelectorAll("[data-action=ob-prev]").forEach(el => {
    el.onclick = () => { state.onboarding.step = Math.max(0, state.onboarding.step - 1); saveState(); render(); };
  });

  const obNextProfile = document.querySelector("[data-action=ob-next-from-profile]");
  if (obNextProfile) obNextProfile.onclick = () => {
    const name = (document.getElementById("ob-name") || {}).value || "";
    state.user.name = name.trim() || "Lifter";
    state.user.unit = (document.getElementById("ob-unit") || {}).value || "kg";
    state.user.phase = (document.getElementById("ob-phase") || {}).value || "maintenance";
    // Update users list label
    const users = loadUsersList();
    const u = users.find(x => x.id === getActiveUserId());
    if (u) { u.name = state.user.name; saveUsersList(users); }
    state.onboarding.step = 2;
    saveState(); render();
  };

  document.querySelectorAll("[data-ob-kind-name]").forEach(inp => {
    inp.onchange = e => {
      const i = +e.target.dataset.obKindName;
      const oldName = state.onboarding.draftKinds[i];
      const newName = e.target.value.trim() || `Day ${i+1}`;
      state.onboarding.draftKinds[i] = newName;
      state.onboarding.draftTargets[newName] = state.onboarding.draftTargets[oldName] ?? 0;
      delete state.onboarding.draftTargets[oldName];
      state.onboarding.draftTemplate[newName] = state.onboarding.draftTemplate[oldName] || [];
      delete state.onboarding.draftTemplate[oldName];
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-ob-kind-target]").forEach(inp => {
    inp.onchange = e => {
      const i = +e.target.dataset.obKindTarget;
      const k = state.onboarding.draftKinds[i];
      state.onboarding.draftTargets[k] = Math.max(0, +e.target.value || 0);
      saveState();
    };
  });
  document.querySelectorAll("[data-action=ob-remove-kind]").forEach(el => {
    el.onclick = () => {
      const i = +el.dataset.i;
      const k = state.onboarding.draftKinds[i];
      state.onboarding.draftKinds.splice(i, 1);
      delete state.onboarding.draftTargets[k];
      delete state.onboarding.draftTemplate[k];
      saveState(); render();
    };
  });
  const addKindBtn = document.querySelector("[data-action=ob-add-kind]");
  if (addKindBtn) addKindBtn.onclick = () => {
    const n = state.onboarding.draftKinds.length;
    const name = `Day ${n+1}`;
    state.onboarding.draftKinds.push(name);
    state.onboarding.draftTargets[name] = 1;
    state.onboarding.draftTemplate[name] = [];
    saveState(); render();
  };
  const obNextSched = document.querySelector("[data-action=ob-next-from-schedule]");
  if (obNextSched) obNextSched.onclick = () => {
    // Ensure draftTemplate has all kinds
    state.onboarding.draftKinds.forEach(k => {
      if (!state.onboarding.draftTemplate[k]) state.onboarding.draftTemplate[k] = [];
    });
    state.onboarding.step = 3;
    state.onboarding.currentKindIdx = 0;
    saveState(); render();
  };

  // Build step handlers
  const obSearch = document.querySelector("[data-ob-search]");
  if (obSearch) {
    let t;
    obSearch.oninput = () => {
      state.onboarding.search = obSearch.value;
      clearTimeout(t);
      t = setTimeout(() => { saveState(); render(); document.querySelector("[data-ob-search]")?.focus(); }, 200);
    };
  }
  document.querySelectorAll("[data-action=ob-add-ex]").forEach(el => {
    el.onclick = () => {
      const k = state.onboarding.draftKinds[state.onboarding.currentKindIdx];
      const exId = el.dataset.exid;
      state.onboarding.draftTemplate[k] = state.onboarding.draftTemplate[k] || [];
      state.onboarding.draftTemplate[k].push({ exId, baseSets: 3, required: true });
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=ob-remove-ex]").forEach(el => {
    el.onclick = () => {
      const k = state.onboarding.draftKinds[state.onboarding.currentKindIdx];
      state.onboarding.draftTemplate[k].splice(+el.dataset.i, 1);
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-ob-baseset]").forEach(inp => {
    inp.onchange = e => {
      const i = +e.target.dataset.obBaseset;
      const k = state.onboarding.draftKinds[state.onboarding.currentKindIdx];
      state.onboarding.draftTemplate[k][i].baseSets = Math.max(1, Math.min(10, +e.target.value || 1));
      saveState();
    };
  });
  document.querySelectorAll("[data-ob-req]").forEach(inp => {
    inp.onchange = e => {
      const i = +e.target.dataset.obReq;
      const k = state.onboarding.draftKinds[state.onboarding.currentKindIdx];
      state.onboarding.draftTemplate[k][i].required = !!e.target.checked;
      saveState();
    };
  });
  const obBuildPrev = document.querySelector("[data-action=ob-build-prev]");
  if (obBuildPrev) obBuildPrev.onclick = () => {
    if (state.onboarding.currentKindIdx === 0) { state.onboarding.step = 2; }
    else { state.onboarding.currentKindIdx -= 1; }
    saveState(); render();
  };
  const obBuildNext = document.querySelector("[data-action=ob-build-next]");
  if (obBuildNext) obBuildNext.onclick = () => {
    if (state.onboarding.currentKindIdx < state.onboarding.draftKinds.length - 1) {
      state.onboarding.currentKindIdx += 1;
    } else {
      state.onboarding.step = 4;
    }
    saveState(); render();
  };

  // Review -> start block
  const obStart = document.querySelector("[data-action=ob-start-block]");
  if (obStart) obStart.onclick = () => {
    const ob = state.onboarding;
    state.user.kinds = [...ob.draftKinds];
    state.user.template = {};
    for (const k of ob.draftKinds) {
      state.user.template[k] = (ob.draftTemplate[k] || []).map(e => ({
        exId: e.exId, baseSets: e.baseSets, deloadSets: Math.max(1, Math.floor((e.baseSets || 0)/2)), required: e.required
      }));
    }
    const today = new Date();
    state.currentBlock = {
      id: "block-1",
      startDate: isoDate(startOfWeek(today)),
      lengthWeeks: 5,
      focus: "user-built",
      weeklyTargets: { ...ob.draftTargets },
      prescriptions: {},
      feedback: {},
      activeSlot: null,
      userCookedOverride: false
    };
    state.onboarding = null;
    saveState();
    activeView = "today";
    render();
  };
  document.querySelectorAll("[data-action=start-slot]").forEach(el => {
    el.onclick = () => {
      const wk = +el.dataset.week;
      const sk = el.dataset.slot;
      state.currentBlock.activeSlot = { weekIdx: wk, slotKey: sk };
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=cancel-session]").forEach(el => {
    el.onclick = () => { state.currentBlock.activeSlot = null; saveState(); render(); };
  });
  document.querySelectorAll("[data-action=open-swap]").forEach(el => {
    el.onclick = () => {
      state.currentBlock.swapTarget = {
        weekIdx: +el.dataset.week,
        slotKey: el.dataset.slot,
        exIdx: +el.dataset.ex
      };
      state.currentBlock._swapShowAdd = false;
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=close-swap]").forEach(el => {
    el.onclick = () => {
      state.currentBlock.swapTarget = null;
      state.currentBlock._swapShowAdd = false;
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=do-swap]").forEach(el => {
    el.onclick = () => {
      const target = state.currentBlock.swapTarget;
      if (!target) return;
      const sess = state.currentBlock.prescriptions[target.weekIdx][target.slotKey];
      const ex = sess.exercises[target.exIdx];
      if (!ex.originalExId) ex.originalExId = ex.exId;
      ex.exId = el.dataset.exid;
      // Clear load fields; keep rep/RIR plans
      for (const s of ex.sets) {
        s.weight = null;
        s.plannedLoad = null;
      }
      ex.rxNote = "swapped — set working load on first set";
      state.currentBlock.swapTarget = null;
      state.currentBlock._swapShowAdd = false;
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=show-add-custom]").forEach(el => {
    el.onclick = () => { state.currentBlock._swapShowAdd = true; saveState(); render(); };
  });
  document.querySelectorAll("[data-action=cancel-add-custom]").forEach(el => {
    el.onclick = () => { state.currentBlock._swapShowAdd = false; saveState(); render(); };
  });
  const saveCustom = document.querySelector("[data-action=save-custom-and-swap]");
  if (saveCustom) saveCustom.onclick = () => {
    const name = document.getElementById("custom-name").value.trim();
    if (!name) { alert("Name required."); return; }
    const muscle = document.getElementById("custom-muscle").value;
    const cat = document.getElementById("custom-cat").value;
    const lo = +document.getElementById("custom-rep-lo").value || 8;
    const hi = +document.getElementById("custom-rep-hi").value || 12;
    const inc = +document.getElementById("custom-inc").value || 2.5;
    const id = "custom_" + name.toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_|_$/g, "");
    const meta = { name, primary: muscle, cat, rep: [Math.min(lo, hi), Math.max(lo, hi)], inc };
    state.customExercises = state.customExercises || {};
    state.customExercises[id] = meta;
    EXERCISES[id] = meta;
    // Perform the swap immediately
    const target = state.currentBlock.swapTarget;
    if (target) {
      const sess = state.currentBlock.prescriptions[target.weekIdx][target.slotKey];
      const ex = sess.exercises[target.exIdx];
      if (!ex.originalExId) ex.originalExId = ex.exId;
      ex.exId = id;
      for (const s of ex.sets) { s.weight = null; s.plannedLoad = null; }
      ex.rxNote = "swapped to custom — set working load on first set";
    }
    state.currentBlock.swapTarget = null;
    state.currentBlock._swapShowAdd = false;
    saveState(); render();
  };

  document.querySelectorAll("[data-action=open-custom-builder]").forEach(el => {
    el.onclick = () => {
      state.currentBlock.customBuilder = { exercises: [], search: "" };
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=cancel-custom]").forEach(el => {
    el.onclick = () => { state.currentBlock.customBuilder = null; saveState(); render(); };
  });
  document.querySelectorAll("[data-action=custom-add]").forEach(el => {
    el.onclick = () => {
      const exId = el.dataset.exid;
      state.currentBlock.customBuilder.exercises.push({ exId, targetSets: 3 });
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=custom-remove]").forEach(el => {
    el.onclick = () => {
      state.currentBlock.customBuilder.exercises.splice(+el.dataset.i, 1);
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=custom-set-count]").forEach(el => {
    el.onchange = () => {
      const i = +el.dataset.i;
      const v = Math.max(1, Math.min(10, +el.value || 1));
      state.currentBlock.customBuilder.exercises[i].targetSets = v;
      saveState();
    };
  });
  document.querySelectorAll("[data-action=custom-search]").forEach(el => {
    let timer = null;
    el.oninput = () => {
      state.currentBlock.customBuilder.search = el.value;
      clearTimeout(timer);
      timer = setTimeout(() => { saveState(); render(); document.querySelector("[data-action=custom-search]")?.focus(); }, 200);
    };
  });
  document.querySelectorAll("[data-action=start-custom]").forEach(el => {
    el.onclick = () => {
      const builder = state.currentBlock.customBuilder;
      if (!builder || builder.exercises.length === 0) return;
      const wk = currentWeekIdx(state);
      ensureWeekBuilt(state, wk);
      const date = isoDate(new Date());
      const wkObj = state.currentBlock.prescriptions[wk];
      let counter = 1;
      while (wkObj[`Custom_${date}_${counter}`]) counter++;
      const sk = `Custom_${date}_${counter}`;
      const weekRIR = RIR_LADDER[wk];
      wkObj[sk] = {
        kind: "Custom",
        instance: counter,
        completedDate: null,
        exercises: builder.exercises.map(b => {
          const prev = findLastCompletedExercise(state, b.exId);
          const rx = nextRx(b.exId, prev, weekRIR, state.user.phase);
          const sets = [];
          for (let i = 0; i < b.targetSets; i++) {
            sets.push({
              plannedReps: rx.reps, plannedLoad: rx.load, plannedRIR: rx.rir,
              weight: null, reps: null, rir: null
            });
          }
          return { exId: b.exId, targetSets: b.targetSets, required: true, sets, rxNote: rx.note };
        })
      };
      state.currentBlock.customBuilder = null;
      state.currentBlock.activeSlot = { weekIdx: wk, slotKey: sk };
      saveState(); render();
    };
  });
  document.querySelectorAll("[data-action=open-catchup]").forEach(el => {
    el.onclick = () => {
      alert("Catch-up flow: open a pending floating exercise from Block view or just start any Pull/Push/Legs session — uncompleted floating sets will appear there.");
    };
  });
  document.querySelectorAll("[data-set-input]").forEach(input => {
    input.onchange = e => {
      const { week, slot, ex, i, field } = e.target.dataset;
      const w = +week, exi = +ex, ii = +i;
      const sess = state.currentBlock.prescriptions[w][slot];
      if (!sess) return;
      const set = sess.exercises[exi].sets[ii];
      set[field] = e.target.value === "" ? null : +e.target.value;
      saveState();
    };
  });
  document.querySelectorAll("[data-action=set-fb]").forEach(b => {
    b.onclick = () => {
      const { muscle, key, val, fbkey, when } = b.dataset;
      const fb = state.currentBlock.feedback;
      if (!fb[fbkey]) fb[fbkey] = { date: isoDate(new Date()) };
      if (!fb[fbkey][when]) fb[fbkey][when] = {};
      if (!fb[fbkey][when][muscle]) fb[fbkey][when][muscle] = {};
      fb[fbkey][when][muscle][key] = +val;
      saveState();
      render();
    };
  });
  document.querySelectorAll("[data-action=save-session]").forEach(b => {
    b.onclick = () => {
      const active = state.currentBlock.activeSlot;
      if (!active) return;
      const sess = state.currentBlock.prescriptions[active.weekIdx][active.slotKey];
      sess.completedDate = isoDate(new Date());
      const fbKey = `${active.weekIdx}|${active.slotKey}`;
      if (!state.currentBlock.feedback[fbKey]) state.currentBlock.feedback[fbKey] = { date: sess.completedDate };
      state.currentBlock.feedback[fbKey].date = sess.completedDate;
      applyAutoregulation(state, active.weekIdx, active.slotKey);
      state.currentBlock.activeSlot = null;
      saveState();
      alert("Session saved. Next-session prescriptions updated.");
      render();
    };
  });

  const unitSel = document.querySelector("[data-action=set-unit]");
  if (unitSel) unitSel.onchange = e => { state.user.unit = e.target.value; saveState(); render(); };
  document.querySelectorAll("[data-action=set-phase]").forEach(b => {
    b.onclick = () => {
      state.user.phase = b.dataset.phase;
      saveState(); render();
    };
  });
  const capInp = document.querySelector("[data-action=set-spec-cap]");
  if (capInp) capInp.onchange = e => { state.user.specializationCap = +e.target.value || 3; saveState(); };

  document.querySelectorAll("[data-action=set-target]").forEach(inp => {
    inp.onchange = e => {
      const kind = e.target.dataset.kind;
      state.currentBlock.weeklyTargets[kind] = +e.target.value || 0;
      saveState();
      render();
    };
  });

  document.querySelectorAll("[data-action=set-lm]").forEach(inp => {
    inp.onchange = e => {
      const { m, k } = e.target.dataset;
      const v = +e.target.value;
      if (k === "MAV0") state.landmarks[m].MAV[0] = v;
      else if (k === "MAV1") state.landmarks[m].MAV[1] = v;
      else state.landmarks[m][k] = v;
      saveState();
    };
  });

  const deBtn = document.querySelector("[data-action=trigger-deload]");
  if (deBtn) deBtn.onclick = () => {
    if (!confirm("Trigger an early deload? Current week becomes the deload week.")) return;
    state.currentBlock.userCookedOverride = true;
    saveState(); render();
  };
  const advBtn = document.querySelector("[data-action=advance-week]");
  if (advBtn) advBtn.onclick = () => {
    state.currentBlock.startDate = isoDate(new Date(Date.now() - (currentWeekIdx(state) + 1) * 7 * 86400000));
    saveState(); render();
  };
  const resetBtn = document.querySelector("[data-action=reset-block]");
  if (resetBtn) resetBtn.onclick = () => {
    if (!confirm("Reset Block 1? Clears all logs.")) return;
    state.currentBlock.prescriptions = {};
    state.currentBlock.feedback = {};
    state.currentBlock.activeSlot = null;
    state.currentBlock.userCookedOverride = false;
    ensureWeekBuilt(state, 0);
    saveState(); render();
  };

  const expBtn = document.querySelector("[data-action=export-json]");
  if (expBtn) expBtn.onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], { type:"application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `rp-clone-${isoDate(new Date())}.json`;
    a.click(); URL.revokeObjectURL(url);
  };
  const impEl = document.querySelector("[data-action=import-json]");
  if (impEl) impEl.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const fr = new FileReader();
    fr.onload = () => {
      try { state = JSON.parse(fr.result); saveState(); render(); alert("Imported."); }
      catch (err) { alert("Bad JSON: " + err.message); }
    };
    fr.readAsText(f);
  };

  const swapBtn = document.querySelector("[data-action=swap-glute]");
  if (swapBtn) swapBtn.onclick = () => {
    for (let w = 0; w < state.currentBlock.lengthWeeks; w++) {
      ensureWeekBuilt(state, w);
      const wkObj = state.currentBlock.prescriptions[w];
      for (const sess of Object.values(wkObj)) {
        if (sess.kind !== "Legs") continue;
        sess.exercises.forEach(ex => {
          if (ex.exId === "back_extension") { ex.exId = "hip_thrust"; ex.required = true; }
          else if (ex.exId === "hip_thrust") { ex.exId = "back_extension"; ex.required = false; }
        });
      }
    }
    saveState(); render();
  };
}

// ============================================================================
// BOOT
// ============================================================================

render();
</script>
</body>
</html>
